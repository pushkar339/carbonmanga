<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carbon Manga | Admin Panel</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <style>
      .admin-container {
        margin-top: 100px;
        min-height: 80vh;
      }
      .admin-form {
        background: var(--carbon-gray);
        padding: 2rem;
        border-radius: var(--card-radius);
        margin-bottom: 2rem;
      }
      .form-group {
        margin-bottom: 1rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: var(--text-dim);
        font-weight: 500;
      }
      .form-group input, .form-group select {
        width: 100%;
        padding: 0.8rem;
        border-radius: 8px;
        border: 1px solid var(--glass-border);
        background: var(--carbon-black);
        color: var(--text-light);
        font-family: var(--font-main);
      }
      .form-group input:focus {
        border-color: var(--manga-red);
        outline: none;
      }
      .cover-upload-zone {
        border: 3px dashed var(--stroke-color);
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition: var(--transition-smooth);
        position: relative;
        min-height: 180px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        background: var(--panel-gray);
      }
      .cover-upload-zone:hover, .cover-upload-zone.dragover {
        border-color: var(--manga-red);
        background: var(--manga-red-dim);
      }
      .cover-upload-zone .upload-icon {
        font-size: 2.5rem;
        color: var(--text-muted);
      }
      .cover-upload-zone .upload-text {
        font-weight: 600;
        color: var(--text-muted);
        font-size: 0.9rem;
      }
      .cover-upload-zone .upload-text span {
        color: var(--manga-red);
        text-decoration: underline;
      }
      .cover-preview {
        max-width: 150px;
        max-height: 200px;
        object-fit: cover;
        border: 3px solid var(--manga-red);
        display: none;
      }
      .cover-upload-zone.has-image .upload-icon,
      .cover-upload-zone.has-image .upload-text {
        display: none;
      }
      .books-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1.5rem;
      }
      .books-table th, .books-table td {
        padding: 1rem;
        text-align: left;
        border-bottom: 1px solid var(--glass-border);
      }
      .books-table th {
        font-family: var(--font-heading);
        text-transform: uppercase;
        color: var(--manga-red);
      }
      .btn-danger {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
        border: 1px solid #ef4444;
        padding: 8px 12px;
        border-radius: 6px;
        font-weight: bold;
        transition: var(--transition-smooth);
      }
      .btn-danger:hover {
        background: #ef4444;
        color: white;
      }
      .btn-edit {
        background: rgba(59, 130, 246, 0.15);
        color: #3b82f6;
        border: 1px solid #3b82f6;
        padding: 8px 12px;
        border-radius: 6px;
        font-weight: bold;
        transition: var(--transition-smooth);
        margin-right: 0.5rem;
      }
      .btn-edit:hover {
        background: #3b82f6;
        color: white;
      }
      .btn-save {
        background: rgba(34, 197, 94, 0.15);
        color: #22c55e;
        border: 1px solid #22c55e;
        padding: 8px 12px;
        border-radius: 6px;
        font-weight: bold;
        transition: var(--transition-smooth);
        margin-right: 0.5rem;
      }
      .btn-save:hover {
        background: #22c55e;
        color: white;
      }
      .inline-input {
        padding: 0.4rem 0.5rem;
        border: 2px solid var(--manga-red);
        border-radius: 4px;
        background: var(--panel-gray);
        color: var(--text-white);
        font-family: var(--font-main);
        font-size: 0.85rem;
        width: 100%;
      }
      .inline-select {
        padding: 0.4rem 0.5rem;
        border: 2px solid var(--manga-red);
        border-radius: 4px;
        background: var(--panel-gray);
        color: var(--text-white);
        font-family: var(--font-main);
        font-size: 0.85rem;
        width: 100%;
      }
      .action-btns {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      /* Deals table */
      .deals-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1.5rem;
      }
      .deals-table th, .deals-table td {
        padding: 1rem;
        text-align: left;
        border-bottom: 1px solid var(--glass-border);
      }
      .deals-table th {
        font-family: var(--font-heading);
        text-transform: uppercase;
        color: var(--manga-red);
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <header id="navbar"></header>

    <main class="container admin-container">
      <a href="./index.html" style="display: inline-flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); transition: color 0.2s ease; position: relative; z-index: 1001;" onmouseover="this.style.color='var(--manga-red)'" onmouseout="this.style.color='var(--text-muted)'">&larr; Back to Store</a>
      <h1 class="section-title">Admin Dashboard</h1>
      
      <div class="admin-form">
        <h2 style="margin-bottom: 1.5rem">Add New Manga</h2>
        <form id="add-book-form">
          <div class="form-group">
            <label>Title</label>
            <input type="text" id="book-title" placeholder="e.g. Bleach (VOL. 1)" required />
          </div>
          <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="book-price" placeholder="e.g. 599" required />
          </div>
          <div class="form-group">
            <label>Stock Status</label>
            <select id="book-stock" required>
              <option value="In Stock">In Stock</option>
              <option value="5 left">5 left</option>
              <option value="3 left">3 left</option>
              <option value="Sold Out">Sold Out</option>
            </select>
          </div>
          <div class="form-group">
            <label>Cover Image</label>
            <div id="cover-upload-zone" class="cover-upload-zone">
              <div class="upload-icon">📷</div>
              <div class="upload-text">Drag & drop an image here or <span>click to browse</span></div>
              <img id="cover-preview" class="cover-preview" alt="Cover Preview" />
              <input type="file" id="book-cover-file" accept="image/*" style="display: none;" />
            </div>
          </div>
          <div class="form-group">
            <label>Genre</label>
            <input type="text" id="book-genre" placeholder="e.g. Action" required />
          </div>
          <button type="submit" class="btn-buy" style="margin-top: 1rem;">Add Book</button>
        </form>
      </div>

      <div class="admin-form">
        <h2 style="margin-bottom: 1.5rem">Manage Inventory</h2>
        <div style="overflow-x: auto;">
          <table class="books-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Genre</th>
                <th>Cover</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="inventory-list">
              <!-- Items will be injected here -->
            </tbody>
          </table>
        </div>
      </div>

      <!-- Deals Management Section -->
      <div class="admin-form">
        <h2 style="margin-bottom: 1.5rem">Manage Deals</h2>
        <form id="add-deal-form" style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem;">
          <div class="form-group" style="flex: 1; min-width: 150px;">
            <label>Deal Title</label>
            <input type="text" id="deal-title" placeholder="e.g. Flash Sale" required />
          </div>
          <div class="form-group" style="flex: 2; min-width: 200px;">
            <label>Description</label>
            <input type="text" id="deal-desc" placeholder="e.g. 20% OFF this weekend" required />
          </div>
          <button type="submit" class="btn-buy" style="height: fit-content; padding: 0.8rem 1.5rem;">Add Deal</button>
        </form>
        <div style="overflow-x: auto;">
          <table class="deals-table">
            <thead>
              <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="deals-list">
              <!-- Deals will be injected here -->
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <footer id="footer"></footer>
    <script type="module" src="./admin.js"></script>
  </body>
</html>
